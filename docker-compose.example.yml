services:
  copilot-api:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      COPILOT_API_ADDR: "0.0.0.0:8080"
      COPILOT_API_KEY: "change-me"
      # Optional token auth for the Copilot SDK. Otherwise mount/use logged-in auth appropriate for your environment.
      # GITHUB_TOKEN: "${GITHUB_TOKEN}"
    volumes:
      - copilot-api-data:/home/nonroot/.local/share/copilot-api
      - copilot-api-state:/home/nonroot/.local/state/copilot-api
      - copilot-api-cache:/home/nonroot/.cache/copilot-api
      - copilot-api-config:/home/nonroot/.config/copilot-api

volumes:
  copilot-api-data:
  copilot-api-state:
  copilot-api-cache:
  copilot-api-config:
