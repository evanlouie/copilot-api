services:
  copilot-api:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test: ["CMD", "/usr/local/bin/copilot-api", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2"
    environment:
      COPILOT_API_ADDR: "0.0.0.0:8080"
      COPILOT_API_KEY: "${COPILOT_API_KEY:?required}"
      # Optional token auth for the Copilot SDK. Otherwise mount/use logged-in auth appropriate for your environment.
      # GITHUB_TOKEN: "${GITHUB_TOKEN}"
    volumes:
      - copilot-api-data:/home/nonroot/.local/share/copilot-api
      - copilot-api-state:/home/nonroot/.local/state/copilot-api
      - copilot-api-cache:/home/nonroot/.cache/copilot-api
      - copilot-api-config:/home/nonroot/.config/copilot-api

volumes:
  copilot-api-data:
  copilot-api-state:
  copilot-api-cache:
  copilot-api-config:
